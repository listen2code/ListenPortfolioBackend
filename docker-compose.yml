# ===================================================================
# Portfolio 应用监控系统 Docker Compose 统一配置
# ===================================================================
# 启动方式：docker-compose --profile local up -d --build
# 包含服务：App + MySQL + Redis + Prometheus + Grafana
# 环境切换：通过 SPRING_PROFILES_ACTIVE 环境变量（已设为 docker）
# ===================================================================

services:
  # ===================================================================
  # Portfolio 主应用服务
  # ===================================================================
  # 作用：Spring Boot 应用，提供 REST API 和业务功能
  # 端口：8080 (HTTP API)
  # 依赖：数据库服务必须健康才能启动
  # JVM 优化：配置了堆内存和 G1GC 垃圾收集器
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      # 激活 Docker profile（加载 application-docker.properties 覆盖 hostname）
      SPRING_PROFILES_ACTIVE: docker
      # 数据库凭据（与 application.properties 中 ${DB_USERNAME} ${DB_PASSWORD} 对应）
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Ls-88888888}
      # JWT 密钥（生产环境必须覆盖）
      JWT_SECRET: ${JWT_SECRET:-your-super-strong-secret-key-that-is-at-least-256-bits-long}
      # 邮件配置
      MAIL_USERNAME: ${MAIL_USERNAME:-listen2code@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-wlrwwiltnwvbjinn}
      # JVM 性能优化参数
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}
    networks:
      - portfolio-network
    restart: unless-stopped
    profiles:
      - local

  # ===================================================================
  # Redis 缓存和黑名单服务
  # ===================================================================
  # 作用：提供缓存存储和 Token 黑名单功能
  # 端口：6379 (主机) -> 6379 (容器)
  # 版本：Redis 7.2
  # 特性：持久化、内存优化、健康检查
  redis:
    image: redis:7.2-alpine
    container_name: redis-local
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - local

  # ===================================================================
  # MySQL 数据库服务
  # ===================================================================
  # 作用：提供数据持久化存储
  # 端口：3307 (主机) -> 3306 (容器)
  # 版本：MySQL 8.0
  # 健康检查：通过 mysqladmin ping 命令检查数据库可用性
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Ls-88888888}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - portfolio-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Ls-88888888}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - local

  # ===================================================================
  # Prometheus 监控服务
  # ===================================================================
  # 作用：收集和存储应用指标数据
  # 端口：9090 (Web UI)
  # 数据保留：200 小时的历史数据
  # 配置：从外部配置文件加载监控目标
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-local
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-200h}'
      - '--web.enable-lifecycle'
    networks:
      - portfolio-network
    restart: unless-stopped
    profiles:
      - local

  # ===================================================================
  # Grafana 可视化服务
  # ===================================================================
  # 作用：提供监控数据的可视化仪表板
  # 端口：3000 (Web UI)
  # 认证：admin/admin123
  # 配置：自动加载数据源和仪表板
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-local
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - portfolio-network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    profiles:
      - local

# ===================================================================
# 网络配置
# ===================================================================
# portfolio-network：自定义桥接网络，确保服务间可以通过服务名通信
# 例如：app 可以通过 http://db:3306 访问数据库
networks:
  portfolio-network:
    driver: bridge

# ===================================================================
# 数据卷配置
# ===================================================================
# db_data：MySQL 数据持久化
# redis_data：Redis 数据持久化
# prometheus_data：Prometheus 指标数据持久化
# grafana_data：Grafana 配置和仪表板持久化
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
