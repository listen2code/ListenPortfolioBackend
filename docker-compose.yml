version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/gallery?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Ls-88888888
    networks:
      - gallery-network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: gallery
      MYSQL_ROOT_PASSWORD: Ls-88888888
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gallery-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pLs-88888888"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  gallery-network:
    driver: bridge

volumes:
  db_data: