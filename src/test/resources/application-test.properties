# ===================================================================
# 测试环境配置
# ===================================================================
# Spring Boot 4 中旧的 autoconfigure.exclude 类名（如
# org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration）已不再生效，
# 会导致测试仍去连真实 MySQL。此处改为内存 H2 + 关闭 Flyway。
# 需要 Redis 的 @SpringBootTest 请继承 BaseIntegrationTest（Testcontainers Redis）。
# ===================================================================

spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
# H2 中 year 等为保留字，与 StatEntity.year 等列名冲突
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.flyway.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration

# Redis：默认值；继承 BaseIntegrationTest 时由 @DynamicPropertySource 覆盖为 Testcontainers
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=1

spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=-1ms

logging.level.com.listen.portfolio=INFO
logging.level.org.springframework.data.redis=WARN
