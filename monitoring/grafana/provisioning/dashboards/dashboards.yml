# ===================================================================
# Grafana 仪表板自动配置文件（支持环境变量）
# ===================================================================
# 说明：Grafana 启动时自动扫描并加载仪表板配置
# 作用：实现仪表板的自动部署，无需手动导入
# 扫描目录：/var/lib/grafana/dashboards
# 更新频率：每 10 秒检查一次文件变化
# ===================================================================

apiVersion: 1

# ===================================================================
# 仪表板提供者配置
# ===================================================================
# 说明：定义仪表板的来源和加载方式
# 当前配置：从本地文件系统加载 JSON 格式的仪表板

providers:
  # ===================================================================
  # 默认仪表板提供者
  # ===================================================================
  # 作用：从本地文件系统加载仪表板
  # 文件格式：JSON 格式的 Grafana 仪表板定义
  # 加载方式：自动扫描指定目录下的所有仪表板文件
  - name: 'default'
    orgId: 1  # 组织 ID：1 (默认组织)
    folder: '${GRAFANA_FOLDER:-}'  # 仪表板文件夹：支持环境变量
    type: file  # 提供者类型：文件系统
    disableDeletion: false  # 允许删除仪表板
    updateIntervalSeconds: ${GRAFANA_UPDATE_INTERVAL:-10}  # 更新检查间隔：支持环境变量
    allowUiUpdates: true  # 允许在 UI 中更新仪表板
    options:
      path: ${GRAFANA_DASHBOARDS_PATH:-/var/lib/grafana/dashboards}  # 仪表板文件存储路径（支持环境变量）
