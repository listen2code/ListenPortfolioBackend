# ===================================================================
# Grafana 数据源自动配置文件（支持环境变量）
# ===================================================================
# 说明：Grafana 启动时自动加载此配置，创建 Prometheus 数据源
# 作用：避免手动配置数据源，实现开箱即用的监控体验
# 位置：/etc/grafana/provisioning/datasources/datasource.yml
# 加载时机：Grafana 启动时自动读取并应用配置
# ===================================================================

apiVersion: 1

# ===================================================================
# 数据源列表
# ===================================================================
# 说明：定义所有需要自动创建的数据源
# 当前配置：创建一个 Prometheus 数据源，连接到 Prometheus 服务

datasources:
  # ===================================================================
  # Prometheus 数据源配置
  # ===================================================================
  # 作用：连接到 Prometheus 服务，获取指标数据
  # 访问方式：通过代理访问，避免跨域问题
  # 地址：http://prometheus:9090 (Docker 网络中的服务名)
  - name: Prometheus
    type: prometheus  # 数据源类型：Prometheus
    access: proxy     # 访问方式：通过 Grafana 代理访问
    url: http://${PROMETHEUS_HOST:-prometheus}:${PROMETHEUS_PORT:-9090}  # Prometheus 服务地址（支持环境变量）
    isDefault: true   # 设为默认数据源
    editable: true    # 允许在 UI 中编辑配置
