# ===================================================================
# 应用基础配置
# ===================================================================
# 说明：应用名称配置，用于服务注册发现、日志标识、监控指标分组
# 原理：Spring Boot 使用此名称在日志、指标、健康检查中标识应用实例
# 使用场景：微服务架构中的服务识别、日志聚合分析、监控告警配置
spring.application.name=portfolio

# ===================================================================
# 数据源配置
# ===================================================================
# 说明：数据库连接 URL，支持环境变量注入，提供故障转移默认值
# 原理：使用 Spring 的 PropertySource 机制，优先读取环境变量，无则使用默认值
# 配置详解：
# - useSSL=false：禁用 SSL 连接（开发环境），生产环境建议启用
# - serverTimezone=Asia/Tokyo：设置时区为东京时间，确保时间戳准确性
# - collation=utf8mb4_bin：使用 UTF8MB4 字符集和二进制排序，支持 emoji 和区分大小写
# 安全考虑：生产环境密码应使用加密配置或配置中心管理
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio?useSSL=false&serverTimezone=Asia/Tokyo&collation=utf8mb4_bin}
# 说明：数据库用户名，支持环境变量注入，默认 root 用户
# 安全建议：生产环境应使用最小权限的数据库用户，避免使用 root
spring.datasource.username=${DB_USERNAME:root}
# 说明：数据库密码，支持环境变量注入，提供默认密码
# 安全警告：默认密码仅用于开发环境，生产环境必须修改为强密码并通过安全渠道配置
spring.datasource.password=${DB_PASSWORD:Ls-88888888}

# ===================================================================
# JPA 与 Hibernate 配置
# ===================================================================
# 说明：Hibernate 自动DDL模式，控制数据库表结构自动更新策略
# 可选值：none（不操作）、validate（仅验证）、update（更新表结构）、create（重新创建）
# 安全警告：生产环境建议使用 validate，避免自动修改表结构造成数据丢失
spring.jpa.hibernate.ddl-auto=update
# 说明：显示执行的 SQL 语句，便于开发调试和性能优化
# 使用建议：开发环境启用，生产环境关闭，避免敏感 SQL 信息泄露
spring.jpa.show-sql=true
# 说明：关闭 Open Session In View（OSIV），避免在 Controller/序列化阶段触发懒加载查询，提升可预测性与性能
# 原理：关闭后要求在 Service 层（事务内）完成数据装配，Controller 只返回 DTO
# 性能考虑：关闭后可避免 N+1 查询问题，提升接口响应性能
# spring.jpa.open-in-view=false

# ===================================================================
# 数据库初始化配置
# ===================================================================
# 说明：SQL 脚本初始化模式，控制数据库启动时是否执行初始化脚本
# 可选值：always（总是执行）、never（从不执行）、embedded（仅嵌入式数据库执行）
# 使用场景：数据库表结构初始化、基础数据插入、测试数据准备
spring.sql.init.mode=always
# 说明：延迟数据源初始化，确保 Hibernate 完成实体映射后再执行初始化脚本
# 原理：等待 JPA 实体扫描和表结构创建完成后，再执行 data.sql 等初始化脚本
# 使用场景：需要先创建表结构再插入初始化数据的场景
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# JWT 安全配置
# ===================================================================
# 说明：JWT 签名密钥，支持环境变量注入，提供默认密钥
# 安全要求：密钥长度必须至少 256 位（32 字符），生产环境必须使用强随机密钥
# 配置建议：不同环境使用不同密钥，密钥应存储在安全配置中心或密钥管理系统
# 警告：默认密钥仅用于开发测试，生产环境必须替换为安全的随机密钥
jwt.secret=${JWT_SECRET:your-super-strong-secret-key-that-is-at-least-256-bits-long}
# 说明：访问令牌过期时间（毫秒），默认 5 分钟
# 安全考虑：访问令牌有效期应较短，降低令牌被盗用的风险
# 使用场景：API 接口访问认证，过期后需使用刷新令牌获取新令牌
# 建议值：生产环境建议 15-30 分钟（900000-1800000 毫秒）
jwt.expiration=${JWT_EXPIRATION:300000}
# 说明：刷新令牌过期时间（毫秒），默认 24 小时
# 安全考虑：刷新令牌有效期较长，但应定期验证其有效性
# 使用场景：获取新的访问令牌，避免频繁重新登录
# 建议值：生产环境建议 7-30 天（604800000-2592000000 毫秒）
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# ===================================================================
# 日志配置
# ===================================================================
# 说明：根日志级别，控制应用的整体日志输出详细程度
# 可选值：TRACE、DEBUG、INFO、WARN、ERROR、FATAL（从详细到简略）
# 使用建议：开发环境使用 DEBUG，测试环境使用 INFO，生产环境使用 WARN 或 ERROR
logging.level.root=INFO
# 说明：启用 SpringDoc 调试日志，便于排查 Swagger 问题
logging.level.org.springdoc=DEBUG
logging.level.io.swagger=DEBUG
# 说明：启用 ANSI 彩色日志输出，提升日志的可读性
# 原理：在控制台输出彩色日志，便于区分不同级别的日志信息
# 注意：某些终端可能不支持 ANSI 颜色，可根据需要关闭
spring.output.ansi.enabled=always
# 说明：指定使用 logback-spring.xml，输出 JSON 结构化日志，便于接入 ELK/Loki 等日志平台
# 原理：Logback 使用指定的配置文件，实现日志格式化和输出目标配置
# 使用场景：结构化日志收集、日志分析平台接入、分布式日志追踪
logging.config=classpath:logback-spring.xml

# ===================================================================
# 模板引擎配置
# ===================================================================
# 说明：当前项目以 REST API 为主，未使用 Thymeleaf 模板时关闭模板路径检查，避免启动告警
# 原理：Spring Boot 默认会检查模板文件路径，关闭后可避免不必要的文件系统检查
# 使用场景：纯 REST API 项目、前后端分离架构、不需要服务端页面渲染的项目
# 注意：如果需要使用 Thymeleaf 模板（如邮件模板），需要将此配置改为 true
spring.thymeleaf.check-template-location=false

# ===================================================================
# 监控与健康检查配置
# ===================================================================
# 说明：开放健康检查、应用信息和 Prometheus 指标端点，供探活与监控采集使用（不包含敏感配置）
# 原理：Spring Boot Actuator 暴露管理和监控端点，支持 HTTP 访问
# 端点详解：
# - health：健康检查，返回应用运行状态
# - info：应用信息，返回自定义的应用详情
# - prometheus：Prometheus 指标，返回应用性能指标数据
# 安全考虑：生产环境应配合 Spring Security 进行端点访问控制
management.endpoints.web.exposure.include=health,info,prometheus
# 说明：开启存活/就绪探针，配合 Kubernetes/容器编排系统实现健康管理
# 原理：提供 /actuator/health/liveness 和 /actuator/health/readiness 端点
# 使用场景：Kubernetes 集群部署、容器编排系统、自动化运维平台
# 探针说明：
# - Liveness：存活探针，检测应用是否正常运行
# - Readiness：就绪探针，检测应用是否准备好接收请求
management.endpoint.health.probes.enabled=true

# ===================================================================
# OpenAPI/Swagger 配置
# ===================================================================
# 说明：SpringDoc OpenAPI 路径配置，用于生成 API 文档
# 原理：SpringDoc 扫描 Spring Web 注解，自动生成 OpenAPI 3.0 规范的文档
# 使用场景：API 文档生成、前后端联调、接口测试
springdoc.api-docs.path=/v3/api-docs
# 说明：Swagger UI 路径配置，提供可视化 API 文档界面
# 原理：基于 OpenAPI 规范生成交互式文档页面
# 使用场景：开发者查看 API、在线测试接口、文档分享
springdoc.swagger-ui.path=/swagger-ui.html
# 说明：扫描的包路径，限制 SpringDoc 扫描范围，提升启动性能
# 原理：只扫描指定包下的控制器，避免扫描无关类
# 使用场景：大型项目性能优化、避免文档混乱
springdoc.packages-to-scan=com.listen.portfolio.api
# 说明：禁用默认的 OpenAPI 配置，避免冲突
springdoc.api-docs.enabled=true
# 操作按 HTTP 方法排序
springdoc.swagger-ui.operationsSorter=method
# 标签按字母排序
springdoc.swagger-ui.tagsSorter=alpha
# 默认展开所有操作列表
springdoc.swagger-ui.docExpansion=list
# 显示请求耗时
springdoc.swagger-ui.displayRequestDuration=true
# 默认展开模型
springdoc.swagger-ui.defaultModelsExpandDepth=1
# 启用过滤功能
springdoc.swagger-ui.filter=true
# 启用 Try it out 功能
springdoc.swagger-ui.tryItOutEnabled=true