# Test configuration for Swagger debugging
spring.application.name=portfolio-test

# Enable debug logging for SpringDoc
logging.level.org.springdoc=DEBUG
logging.level.io.swagger=DEBUG

# Simple database config for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA config for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# SpringDoc config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.listen.portfolio.api
