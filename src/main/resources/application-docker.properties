# ===================================================================
# Docker 环境配置（仅覆盖与本地开发不同的部分）
# ===================================================================
# 激活方式：SPRING_PROFILES_ACTIVE=docker
# 原理：Spring Boot 会先加载 application.properties，再用此文件覆盖差异项
# ===================================================================

# 数据库：Docker 网络内通过容器名 "db" 访问（非 localhost）
spring.datasource.url=jdbc:mysql://db:3306/portfolio?useSSL=false&serverTimezone=Asia/Tokyo&collation=utf8mb4_bin&allowPublicKeyRetrieval=true

# Redis：Docker 网络内通过容器名 "redis" 访问（非 localhost）
spring.data.redis.host=redis
